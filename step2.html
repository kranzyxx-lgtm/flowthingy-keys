<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Step 2</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div>
      <div class="step-line"></div>
      <div class="step-dot active">2</div>
      <div class="step-line"></div>
      <div class="step-dot pending">3</div>
      <div class="step-line"></div>
      <div class="step-dot pending">4</div>
    </div>
    <div class="card-title">Step 1 done — keep going</div>
    <div class="card-desc">Good job. Two more after this. Just complete the link below and you're halfway there.</div>
    <a class="btn" id="goBtn">Continue &rarr;</a>
    <p class="note">Don't skip — each step is required for the key to generate.</p>
  </div>
</div>
<script>
const LINK2 = "https://linkvertise.com/REPLACE_LINK_2";
const p     = new URLSearchParams(location.search);
const user  = p.get('r') || sessionStorage.getItem('ft_user') || '';
if (user) sessionStorage.setItem('ft_user', user);
document.getElementById('goBtn').onclick = () => {
  location.href = LINK2 + "?r=" + encodeURIComponent(user);
};
</script>
</body>
</html>
