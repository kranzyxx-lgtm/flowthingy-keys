<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowThingy Bot — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --red:#cc1111;--red2:#e52222;--bg:#080808;--bg2:#0e0e0e;--bg3:#151515;--line:#1f1f1f;--text:#efefef;--sub:#6b6b6b;--green:#3dba72; }
body { font-family:'Space Grotesk',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }

nav {
  height:56px; padding:0 32px;
  display:flex; align-items:center; justify-content:space-between;
  background:var(--bg2); border-bottom:1px solid var(--line);
}
.logo { font-size:1.1rem; font-weight:800; text-decoration:none; }
.logo .f { color:var(--red); } .logo .t { color:#fff; }
.nav-back { color:var(--sub); text-decoration:none; font-size:0.85rem; font-weight:500; }
.nav-back:hover { color:var(--text); }

.login-wrap {
  min-height: calc(100vh - 56px);
  display:flex; align-items:center; justify-content:center; padding:20px;
}
.login-card {
  background:var(--bg2); border:1px solid var(--line); border-radius:12px;
  padding:36px 32px; max-width:380px; width:100%;
}
.login-card h2 { font-size:1.3rem; font-weight:800; margin-bottom:6px; }
.login-card p { font-size:0.85rem; color:var(--sub); margin-bottom:24px; }
input {
  width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--line);
  border-radius:7px; color:var(--text); font-size:0.9rem;
  font-family:'Space Grotesk',sans-serif; outline:none; margin-bottom:14px; transition:border-color .15s;
}
input:focus { border-color:var(--red); }
.btn { width:100%; padding:11px; background:var(--red); color:#fff; border:none; border-radius:7px; font-size:0.9rem; font-weight:700; font-family:'Space Grotesk',sans-serif; cursor:pointer; }
.btn:hover { background:var(--red2); }
.err { color:#ff5555; font-size:0.8rem; margin-bottom:10px; display:none; }

.dash-wrap { max-width:900px; margin:0 auto; padding:32px 20px; display:none; }
.dash-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:28px; flex-wrap:wrap; gap:12px; }
.bot-name { font-size:1.5rem; font-weight:800; }
.status-badge { display:inline-flex; align-items:center; gap:6px; padding:5px 14px; border-radius:20px; font-size:0.78rem; font-weight:700; }
.status-badge.online  { background:rgba(61,186,114,0.15); color:var(--green); border:1px solid rgba(61,186,114,0.3); }
.status-badge.offline { background:rgba(204,17,17,0.15); color:#ff5555; border:1px solid rgba(204,17,17,0.3); }
.status-badge.pending { background:rgba(255,170,0,0.15); color:#ffaa00; border:1px solid rgba(255,170,0,0.3); }
.status-dot { width:7px; height:7px; border-radius:50%; }
.online .status-dot  { background:var(--green); animation:pulse-g 1.5s infinite; }
.offline .status-dot { background:#ff5555; }
.pending .status-dot { background:#ffaa00; animation:pulse-o 1.5s infinite; }
@keyframes pulse-g { 0%,100%{box-shadow:0 0 0 0 rgba(61,186,114,.5)} 50%{box-shadow:0 0 0 5px rgba(61,186,114,0)} }
@keyframes pulse-o { 0%,100%{box-shadow:0 0 0 0 rgba(255,170,0,.5)} 50%{box-shadow:0 0 0 5px rgba(255,170,0,0)} }

.grid-2 { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px; }
.card { background:var(--bg2); border:1px solid var(--line); border-radius:10px; padding:22px 20px; }
.card-label { font-size:0.7rem; font-weight:700; text-transform:uppercase; letter-spacing:1.5px; color:var(--sub); margin-bottom:8px; }
.card-value { font-size:1.1rem; font-weight:700; font-family:'JetBrains Mono',monospace; }

.controls { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:24px; }
.ctrl-btn { padding:9px 22px; border-radius:6px; font-size:0.85rem; font-weight:700; font-family:'Space Grotesk',sans-serif; cursor:pointer; border:none; transition:background .15s; }
.ctrl-btn.start  { background:var(--green); color:#000; }
.ctrl-btn.stop   { background:#cc2222; color:#fff; }
.ctrl-btn.restart{ background:#333; color:#fff; border:1px solid var(--line); }
.ctrl-btn:disabled { opacity:.4; cursor:default; }

.log-box {
  background:var(--bg3); border:1px solid var(--line); border-radius:8px;
  padding:16px; height:200px; overflow-y:auto;
  font-family:'JetBrains Mono',monospace; font-size:0.78rem; line-height:1.6; color:#aaa;
}
.log-line.info  { color:#aaa; }
.log-line.ok    { color:var(--green); }
.log-line.err   { color:#ff5555; }
.log-line.warn  { color:#ffaa00; }

.config-section { margin-top:24px; }
.config-section h3 { font-size:1rem; font-weight:700; margin-bottom:16px; }
.config-grid { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
label { display:block; font-size:0.75rem; font-weight:600; color:var(--sub); margin-bottom:5px; letter-spacing:.5px; text-transform:uppercase; }
select { width:100%; padding:10px 14px; background:var(--bg3); border:1px solid var(--line); border-radius:7px; color:var(--text); font-size:0.875rem; font-family:'Space Grotesk',sans-serif; outline:none; }
select:focus { border-color:var(--red); }
select option { background:var(--bg3); }
.save-btn { margin-top:16px; padding:10px 24px; background:var(--red); color:#fff; border:none; border-radius:6px; font-size:0.875rem; font-weight:700; font-family:'Space Grotesk',sans-serif; cursor:pointer; }
.save-btn:hover { background:var(--red2); }

@media(max-width:600px){ .grid-2,.config-grid{grid-template-columns:1fr;} }
</style>
</head>
<body>

<nav>
  <a class="logo" href="index.html"><span class="f">Flow</span><span class="t">Thingy</span></a>
  <a class="nav-back" href="index.html">← Back to site</a>
</nav>

<!-- Login -->
<div class="login-wrap" id="loginWrap">
  <div class="login-card">
    <h2>Bot Dashboard</h2>
    <p>Enter your owner password to access your bot controls.</p>
    <div class="err" id="loginErr">Wrong password. Try again.</div>
    <input type="password" id="passInput" placeholder="Owner password" onkeydown="if(event.key==='Enter')login()">
    <button class="btn" onclick="login()">Access Dashboard</button>
  </div>
</div>

<!-- Dashboard -->
<div class="dash-wrap" id="dashWrap">
  <div class="dash-header">
    <div>
      <div class="card-label" style="margin-bottom:4px">Bot Name</div>
      <div class="bot-name" id="dashBotName">—</div>
    </div>
    <span class="status-badge pending" id="statusBadge">
      <span class="status-dot"></span>
      <span id="statusText">Pending</span>
    </span>
  </div>

  <div class="controls">
    <button class="ctrl-btn start"   id="btnStart"   onclick="controlBot('start')">▶ Start</button>
    <button class="ctrl-btn stop"    id="btnStop"    onclick="controlBot('stop')">■ Stop</button>
    <button class="ctrl-btn restart" id="btnRestart" onclick="controlBot('restart')">↺ Restart</button>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-label">Server</div>
      <div class="card-value" id="dashServer">—</div>
    </div>
    <div class="card">
      <div class="card-label">Version</div>
      <div class="card-value" id="dashVersion">—</div>
    </div>
    <div class="card">
      <div class="card-label">Spawn Coords</div>
      <div class="card-value" id="dashSpawn">—</div>
    </div>
    <div class="card">
      <div class="card-label">Behavior</div>
      <div class="card-value" id="dashBehavior">—</div>
    </div>
  </div>

  <div class="card" style="margin-bottom:16px">
    <div class="card-label" style="margin-bottom:10px">Bot Log</div>
    <div class="log-box" id="logBox">
      <div class="log-line info">Waiting for bot to connect...</div>
    </div>
  </div>

  <div class="config-section card">
    <h3>Reconfigure Bot</h3>
    <div class="config-grid">
      <div>
        <label>Behavior</label>
        <select id="cfgBehavior">
          <option value="wander">Wander randomly</option>
          <option value="jump">Jump randomly</option>
          <option value="mine">Break nearby blocks</option>
          <option value="idle">Stay idle</option>
        </select>
      </div>
      <div>
        <label>Spawn X</label>
        <input type="number" id="cfgSpawnX" placeholder="0">
      </div>
      <div>
        <label>Spawn Z</label>
        <input type="number" id="cfgSpawnZ" placeholder="0">
      </div>
      <div>
        <label>Bot Name</label>
        <input type="text" id="cfgBotName" placeholder="BotName" maxlength="16">
      </div>
    </div>
    <button class="save-btn" onclick="saveConfig()">Save Changes</button>
  </div>
</div>

<script>
const SB_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZXprenZqcGdjdnJ1YmJ3dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTM0OTQsImV4cCI6MjA5OTQyOTQ5NH0.ZZMvTSubWXui--aiHx1LVtRDHYEKTQGc5sY8RgVLKVQ";

const params = new URLSearchParams(window.location.search);
const dashId = params.get('id');
let botData = null;

if (!dashId) {
  document.getElementById('loginWrap').innerHTML = '<div style="text-align:center;padding:60px 20px;color:var(--sub)">No bot ID in URL. <a href="index.html" style="color:var(--red)">Create a bot first</a>.</div>';
}

async function login() {
  const pass = document.getElementById('passInput').value;
  if (!pass) return;
  const res = await fetch(`${SB_URL}/rest/v1/bots?dash_id=eq.${dashId}&select=*`,
    { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }});
  const rows = await res.json();
  if (!rows || rows.length === 0) { showLoginErr('Bot not found.'); return; }
  const bot = rows[0];
  if (bot.owner_pass !== btoa(pass)) { showLoginErr('Wrong password. Try again.'); return; }
  botData = bot;
  document.getElementById('loginWrap').style.display = 'none';
  document.getElementById('dashWrap').style.display = 'block';
  loadDash();
  setInterval(refreshStatus, 5000);
}

function showLoginErr(msg) {
  const e = document.getElementById('loginErr');
  e.textContent = msg; e.style.display = 'block';
}

function loadDash() {
  document.getElementById('dashBotName').textContent = botData.bot_name;
  document.getElementById('dashServer').textContent = `${botData.server_ip}:${botData.server_port}`;
  document.getElementById('dashVersion').textContent = botData.mc_version;
  document.getElementById('dashSpawn').textContent = `X:${botData.spawn_x} Z:${botData.spawn_z}`;
  document.getElementById('dashBehavior').textContent = botData.behavior;
  document.getElementById('cfgBehavior').value = botData.behavior;
  document.getElementById('cfgSpawnX').value = botData.spawn_x;
  document.getElementById('cfgSpawnZ').value = botData.spawn_z;
  document.getElementById('cfgBotName').value = botData.bot_name;
  updateStatusBadge(botData.status);
  addLog(`Loaded bot: ${botData.bot_name} on ${botData.server_ip}`, 'info');
}

async function refreshStatus() {
  const res = await fetch(`${SB_URL}/rest/v1/bots?dash_id=eq.${dashId}&select=status,log`,
    { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` }});
  const rows = await res.json();
  if (!rows || rows.length === 0) return;
  updateStatusBadge(rows[0].status);
  if (rows[0].log) updateLog(rows[0].log);
}

function updateStatusBadge(status) {
  const badge = document.getElementById('statusBadge');
  const text  = document.getElementById('statusText');
  badge.className = `status-badge ${status}`;
  text.textContent = status.charAt(0).toUpperCase() + status.slice(1);
}

function addLog(msg, type='info') {
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = `log-line ${type}`;
  line.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function updateLog(logText) {
  const box = document.getElementById('logBox');
  box.innerHTML = '';
  logText.split('\n').filter(Boolean).forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-line info';
    div.textContent = line;
    box.appendChild(div);
  });
  box.scrollTop = box.scrollHeight;
}

async function controlBot(action) {
  addLog(`Sending command: ${action}...`, 'warn');
  await fetch(`${SB_URL}/rest/v1/bots?dash_id=eq.${dashId}`, {
    method: 'PATCH',
    headers: { 'Content-Type':'application/json', apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, Prefer:'return=minimal' },
    body: JSON.stringify({ command: action, status: action === 'stop' ? 'offline' : 'pending' })
  });
  addLog(`Command sent: ${action}`, 'ok');
  updateStatusBadge(action === 'stop' ? 'offline' : 'pending');
}

async function saveConfig() {
  const BAD_WORDS = ['nigger','nigga','fuck','shit','bitch','cunt','faggot','retard'];
  const newName = document.getElementById('cfgBotName').value.trim();
  if (BAD_WORDS.some(w => newName.toLowerCase().includes(w))) { alert('Bot name contains inappropriate words.'); return; }
  await fetch(`${SB_URL}/rest/v1/bots?dash_id=eq.${dashId}`, {
    method: 'PATCH',
    headers: { 'Content-Type':'application/json', apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}`, Prefer:'return=minimal' },
    body: JSON.stringify({
      behavior: document.getElementById('cfgBehavior').value,
      spawn_x:  parseInt(document.getElementById('cfgSpawnX').value) || 0,
      spawn_z:  parseInt(document.getElementById('cfgSpawnZ').value) || 0,
      bot_name: newName,
      command: 'restart'
    })
  });
  addLog('Config saved. Bot will restart with new settings.', 'ok');
  document.getElementById('dashBotName').textContent = newName;
}
</script>
</body>
</html>
