<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Step 3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot active">3</div><div class="step-line"></div>
      <div class="step-dot pending">4</div>
    </div>
    <div id="content"><div class="card-desc">Verifying...</div></div>
  </div>
</div>
<script>
const SB_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SB_KEY = "sb_publishable_dhA6MjRAMxL6pp8GSqn6Jw_N-kCi8bS";
const LINK3  = "https://link-center.net/1365538/w87FRzlkUl0l";

function randTok() { return Math.random().toString(36).substr(2,10)+Math.random().toString(36).substr(2,10); }

async function init() {
  const p=new URLSearchParams(location.search), token=p.get('t'), user=p.get('r')||sessionStorage.getItem('ft_user')||'';
  const el=document.getElementById('content');
  if(!token||!user){el.innerHTML=`<p class="err">Invalid. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;}
  const res=await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}&step=eq.2&used=eq.false&select=*`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  const rows=await res.json();
  if(!rows||rows.length===0||new Date(rows[0].expires_at)<new Date()){el.innerHTML=`<p class="err">Expired. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;}
  await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}`,{method:'PATCH',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},body:JSON.stringify({used:true})});
  const tok3=randTok(), exp=new Date(Date.now()+30*60*1000).toISOString();
  await fetch(`${SB_URL}/rest/v1/step_tokens`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},body:JSON.stringify({token:tok3,step:3,minecraft_user:user,expires_at:exp})});
  sessionStorage.setItem('ft_user',user);
  el.innerHTML=`<div class="card-title ok">Step 2 done</div><div class="card-desc">Almost there. One more after this.</div><a class="btn" href="${LINK3}?t=${tok3}&r=${encodeURIComponent(user)}">Step 3 &rarr;</a><p class="note">Last stretch!</p>`;
}
init();
</script>
</body>
</html>
