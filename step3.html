<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Step 3</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot active">3</div><div class="step-line"></div>
      <div class="step-dot pending">4</div>
    </div>
    <div id="content"><div class="card-desc">Verifying...</div></div>
  </div>
</div>
<script>
const SB_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZXprenZqcGdjdnJ1YmJ3dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTM0OTQsImV4cCI6MjA5OTQyOTQ5NH0.ZZMvTSubWXui--aiHx1LVtRDHYEKTQGc5sY8RgVLKVQ";
const LINK3 = {
  linkvertise: "https://link-center.net/1365538/w87FRzlkUl0l",
  workink:     "https://work.ink/2JPY/flowthingy-step4"
};

function randTok() { return Math.random().toString(36).substr(2,10)+Math.random().toString(36).substr(2,10); }

async function init() {
  const token=localStorage.getItem('ft_token2'), user=localStorage.getItem('ft_user')||'';
  const leftAt=parseInt(localStorage.getItem('ft_left_at')||'0');
  const el=document.getElementById('content');
  if(!token||!user){el.innerHTML=`<p class="err">Invalid. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;}
  if(leftAt===0||(Date.now()-leftAt)/1000<8){
    ['ft_token1','ft_token2','ft_token3','ft_token4','ft_left_at'].forEach(k=>localStorage.removeItem(k));
    el.innerHTML=`<p class="err">Bypass detected. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;
  }
  const res=await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}&step=eq.2&used=eq.false&select=*`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  const rows=await res.json();
  if(!rows||rows.length===0||new Date(rows[0].expires_at)<new Date()){el.innerHTML=`<p class="err">Expired. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;}
  await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}`,{method:'PATCH',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},body:JSON.stringify({used:true})});
  const tok3=randTok(), exp=new Date(Date.now()+30*60*1000).toISOString();
  await fetch(`${SB_URL}/rest/v1/step_tokens`,{method:'POST',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},body:JSON.stringify({token:tok3,step:3,minecraft_user:user,expires_at:exp})});
  localStorage.setItem('ft_token3',tok3);
  el.innerHTML=`<div class="card-title ok">Step 2 done</div><div class="card-desc">Almost there. One more after this.</div><a class="btn" id="lnk">Step 3 &rarr;</a><p class="note">Last stretch!</p>`;
  document.getElementById('lnk').onclick=()=>{
    localStorage.setItem('ft_left_at', Date.now().toString());
    const m=localStorage.getItem('ft_method')||'linkvertise';
    window.location.href=LINK3[m];
  };
}
init();
</script>
</body>
</html>
