<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Get Key</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>

  <div class="card">
    <div class="steps-row">
      <div class="step-dot active">1</div>
      <div class="step-line"></div>
      <div class="step-dot pending">2</div>
      <div class="step-line"></div>
      <div class="step-dot pending">3</div>
      <div class="step-line"></div>
      <div class="step-dot pending">4</div>
    </div>

    <div class="card-title">Enter your username</div>
    <div class="card-desc">Type your Minecraft username then hit the button. You'll go through 4 short steps — complete them all and your key generates automatically. Valid 24 hours.</div>

    <label>Minecraft Username</label>
    <input class="input" id="user" placeholder="your username here" maxlength="32" autocomplete="off" />

    <a class="btn off" id="goBtn">Step 1 of 4 &rarr;</a>
    <p class="note">Takes about 2 minutes. Come back daily to renew.</p>
  </div>
</div>

<script>
const LINK1 = "https://link-hub.net/1365538/rLTEsDhgTS3n";
const inp   = document.getElementById('user');
const btn   = document.getElementById('goBtn');

inp.addEventListener('input', () => {
  const v = inp.value.trim();
  if (v.length >= 2) {
    btn.classList.remove('off');
    btn.onclick = () => {
      sessionStorage.setItem('ft_user', v);
      window.location.href = LINK1 + "?r=" + encodeURIComponent(v);
    };
  } else {
    btn.classList.add('off');
    btn.onclick = null;
  }
});
</script>
</body>
</html>
