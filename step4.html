<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowThingy External — Step 4 of 4</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#ddd;font-family:'Segoe UI',sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .card{background:#111;border:1px solid #1e1e2e;border-radius:12px;padding:40px;
        max-width:480px;width:90%;text-align:center;}
  .logo{font-size:2em;font-weight:900;color:#cc1111;letter-spacing:2px;margin-bottom:6px;}
  .logo span{color:#fff;}
  .sub{color:#666;font-size:0.9em;margin-bottom:30px;}
  .steps{display:flex;justify-content:center;gap:8px;margin-bottom:30px;}
  .step{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
        justify-content:center;font-weight:700;font-size:0.9em;}
  .step.active{background:#cc1111;color:#fff;}
  .step.done{background:#1a4a1a;color:#44ff88;border:1px solid #44ff88;}
  .title{font-size:1.2em;font-weight:700;margin-bottom:8px;}
  .desc{color:#888;font-size:0.9em;margin-bottom:24px;line-height:1.6;}
  .btn{display:block;background:#cc1111;color:#fff;padding:14px 32px;
       border-radius:8px;text-decoration:none;font-weight:700;font-size:1em;
       transition:background 0.2s;width:100%;border:none;cursor:pointer;}
  .btn:hover{background:#ff2222;}
  .note{color:#555;font-size:0.8em;margin-top:16px;}
  .check{color:#44ff88;font-size:1.1em;margin-bottom:16px;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>Thingy</span></div>
  <div class="sub">External Client — Key System</div>

  <div class="steps">
    <div class="step done">✓</div>
    <div class="step done">✓</div>
    <div class="step done">✓</div>
    <div class="step active">4</div>
  </div>

  <div class="check">✅ Step 3 complete!</div>
  <div class="title">Final Step!</div>
  <div class="desc">Complete this last link to get your key instantly!</div>

  <a class="btn" id="goBtn" href="#">Get Your Key →</a>
  <p class="note">Your key will be generated automatically after this!</p>
</div>

<script>
  const LINKVERTISE_4 = "https://linkvertise.com/REPLACE_WITH_YOUR_LINK_4";
  const params = new URLSearchParams(window.location.search);
  const user   = params.get('r') || sessionStorage.getItem('ft_user') || '';
  if (user) sessionStorage.setItem('ft_user', user);
  document.getElementById('goBtn').href = LINKVERTISE_4 + "?r=" + encodeURIComponent(user);
</script>
</body>
</html>
