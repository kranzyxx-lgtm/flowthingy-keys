<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Last Step</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div>
      <div class="step-line"></div>
      <div class="step-dot done">✓</div>
      <div class="step-line"></div>
      <div class="step-dot done">✓</div>
      <div class="step-line"></div>
      <div class="step-dot active">4</div>
    </div>
    <div class="card-title">Final step — then you're done</div>
    <div class="card-desc">Complete this last one and your key will be waiting on the other side. No more steps after this.</div>
    <a class="btn" id="goBtn">Get my key &rarr;</a>
    <p class="note">Key generates instantly, valid for 24 hours.</p>
  </div>
</div>
<script>
const LINK4 = "https://linkvertise.com/REPLACE_LINK_4";
const p     = new URLSearchParams(location.search);
const user  = p.get('r') || sessionStorage.getItem('ft_user') || '';
if (user) sessionStorage.setItem('ft_user', user);
document.getElementById('goBtn').onclick = () => {
  location.href = LINK4 + "?r=" + encodeURIComponent(user);
};
</script>
</body>
</html>
