<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Your Key</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div>
    </div>
    <div id="content"><div class="card-desc" style="text-align:center">generating your key...</div></div>
  </div>
</div>

<script>
const SB_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImF6ZXprenZqcGdjdnJ1YmJ3dWVwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM4NTM0OTQsImV4cCI6MjA5OTQyOTQ5NH0.ZZMvTSubWXui--aiHx1LVtRDHYEKTQGc5sY8RgVLKVQ";

function randKey() {
  const c='abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let k='FT';
  for(let i=0;i<40;i++) k+=c[Math.floor(Math.random()*c.length)];
  return k;
}

// Get user's public IP
async function getIP() {
  try {
    const r = await fetch('https://api.ipify.org?format=json');
    const d = await r.json();
    return d.ip;
  } catch { return 'unknown'; }
}

async function run() {
  const token  = localStorage.getItem('ft_token4');
  const user   = localStorage.getItem('ft_user') || '';
  const leftAt = parseInt(localStorage.getItem('ft_left_at')||'0');
  const el     = document.getElementById('content');

  if (!token || !user) {
    el.innerHTML = `<p class="err">No valid session. <a href="step1.html" style="color:var(--red)">Start from step 1</a></p>`;
    return;
  }
  if (leftAt === 0 || (Date.now()-leftAt)/1000 < 8) {
    ['ft_token1','ft_token2','ft_token3','ft_token4','ft_left_at'].forEach(k=>localStorage.removeItem(k));
    el.innerHTML = `<p class="err">Bypass detected. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;
    return;
  }

  // Validate step-4 token
  const tr = await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}&step=eq.4&used=eq.false&select=*`,
    { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } });
  const trows = await tr.json();
  if (!trows || trows.length === 0 || new Date(trows[0].expires_at) < new Date()) {
    el.innerHTML = `<p class="err">Session expired. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;
    return;
  }

  // Mark token used
  await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}`, {
    method: 'PATCH',
    headers: { 'Content-Type':'application/json', apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, Prefer:'return=minimal' },
    body: JSON.stringify({ used: true })
  });
  ['ft_token1','ft_token2','ft_token3','ft_token4','ft_left_at'].forEach(k=>localStorage.removeItem(k));

  // Get user's IP
  const ip = await getIP();

  // Check if user already has a valid (non-expired) key
  const chk = await fetch(
    `${SB_URL}/rest/v1/licenses?minecraft_user=eq.${encodeURIComponent(user)}&activated=eq.true&select=key,expires_at,ip_address`,
    { headers: { apikey: SB_KEY, Authorization: `Bearer ${SB_KEY}` } }
  );
  const existing = await chk.json();
  const now = new Date();
  const live = Array.isArray(existing) && existing.find(r => new Date(r.expires_at) > now);

  if (live) {
    // User already has a valid key — show countdown
    const exp = new Date(live.expires_at);
    const msLeft = exp - now;
    const hLeft  = Math.floor(msLeft / 3600000);
    const mLeft  = Math.floor((msLeft % 3600000) / 60000);
    el.innerHTML = `
      <div class="card-title" style="color:#e8a030">⏳ Key already active</div>
      <div class="card-desc">You already have a valid key, <b>${user}</b>. You can generate a new one after it expires.</div>
      <div style="background:var(--bg3);border:1px solid #e8a03055;border-radius:8px;padding:14px;margin:16px 0;text-align:center;">
        <div style="font-size:0.8rem;color:var(--muted);margin-bottom:4px">Next key available in</div>
        <div style="font-size:1.8rem;font-weight:700;color:#e8a030;font-family:'JetBrains Mono',monospace">${hLeft}h ${mLeft}m</div>
      </div>
      <div class="key-display" id="kd">${live.key}</div>
      <button class="btn" onclick="copy()">Copy existing key</button>
      <p class="note" style="color:var(--muted)">Your key is still valid — copy it and use it in Minecraft.</p>
    `;
    return;
  }

  // Generate fresh key
  const key = randKey();
  const exp = new Date(now.getTime() + 24*3600*1000).toISOString();

  const ins = await fetch(`${SB_URL}/rest/v1/licenses`, {
    method: 'POST',
    headers: { 'Content-Type':'application/json', apikey:SB_KEY, Authorization:`Bearer ${SB_KEY}`, Prefer:'return=minimal' },
    body: JSON.stringify({
      key, minecraft_user: user,
      expires_at: exp,
      activated: true,
      activated_at: now.toISOString(),
      link_used: true,
      ip_address: ip
    })
  });

  if (ins.ok) {
    show(key, new Date(exp), user, ip, el);
  } else {
    const errText = await ins.text();
    el.innerHTML = `<p class="err">Error (${ins.status}): ${errText}</p>`;
  }
}

function show(key, exp, user, ip, el) {
  const h = Math.round((exp - new Date()) / 3600000);
  el.innerHTML = `
    <div class="card-title ok">Key generated</div>
    <div class="card-desc">Welcome, <b>${user}</b>. This key is locked to your account and IP.</div>
    <div class="key-display" id="kd">${key}</div>
    <button class="btn" onclick="copy()">Copy key</button>
    <p class="warn">⏱ Expires in ~${h}h — you cannot generate a new key until this one expires.</p>
    <div class="how">
      <b>How to activate:</b><br>
      1. Copy the key above<br>
      2. Open Minecraft — an activation screen will appear<br>
      3. Paste your key and click Activate<br>
      4. You're in!
    </div>
  `;
}

function copy() {
  const k = document.getElementById('kd');
  if (!k) return;
  navigator.clipboard.writeText(k.innerText).then(() => {
    const btn = document.querySelector('.btn');
    btn.textContent = 'Copied!';
    setTimeout(() => btn.textContent = 'Copy key', 2000);
  });
}

run();
</script>
</body>
</html>
