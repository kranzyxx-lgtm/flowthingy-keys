<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FlowThingy — Your Key</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-name">Flow<em>Thingy</em></div>
    <div class="brand-tag">External Client · Key Portal</div>
  </div>
  <div class="card">
    <div class="steps-row">
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div><div class="step-line"></div>
      <div class="step-dot done">✓</div>
    </div>
    <div id="content"><div class="card-desc" style="text-align:center">generating your key...</div></div>
  </div>
</div>
<script>
const SB_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SB_KEY = "sb_publishable_dhA6MjRAMxL6pp8GSqn6Jw_N-kCi8bS";

function randKey() {
  const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let key = 'FT';
  for (let i = 0; i < 40; i++) {
    key += chars[Math.floor(Math.random() * chars.length)];
  }
  return key;
}

async function run() {
  const token=localStorage.getItem('ft_token4'), user=localStorage.getItem('ft_user')||'';
  const leftAt=parseInt(localStorage.getItem('ft_left_at')||'0');
  const el=document.getElementById('content');

  if(!token||!user){el.innerHTML=`<p class="err">No valid session. <a href="step1.html" style="color:var(--red)">Start from step 1</a></p>`;return;}
  if(leftAt===0||(Date.now()-leftAt)/1000<8){
    ['ft_token1','ft_token2','ft_token3','ft_token4','ft_left_at'].forEach(k=>localStorage.removeItem(k));
    el.innerHTML=`<p class="err">Bypass detected. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;
  }

  const res=await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}&step=eq.4&used=eq.false&select=*`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  const rows=await res.json();
  if(!rows||rows.length===0||new Date(rows[0].expires_at)<new Date()){
    el.innerHTML=`<p class="err">Session expired. <a href="step1.html" style="color:var(--red)">Start over</a></p>`;return;
  }

  // Mark step-4 token used and clear localStorage tokens
  await fetch(`${SB_URL}/rest/v1/step_tokens?token=eq.${token}`,{
    method:'PATCH',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},
    body:JSON.stringify({used:true})
  });
  ['ft_token1','ft_token2','ft_token3','ft_token4'].forEach(k=>localStorage.removeItem(k));

  // Check if user already has a live key
  const chk=await fetch(`${SB_URL}/rest/v1/licenses?minecraft_user=eq.${encodeURIComponent(user)}&activated=eq.true&select=key,expires_at`,{headers:{apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`}});
  const existing=await chk.json();
  const live=Array.isArray(existing)&&existing.find(r=>new Date(r.expires_at)>new Date());
  if(live){show(live.key,new Date(live.expires_at),user,el);return;}

  // Generate fresh key
  const key=randKey(), exp=new Date(Date.now()+24*3600*1000).toISOString();
  const ins=await fetch(`${SB_URL}/rest/v1/licenses`,{
    method:'POST',headers:{'Content-Type':'application/json',apikey:SB_KEY,Authorization:`Bearer ${SB_KEY}`,Prefer:'return=minimal'},
    body:JSON.stringify({key,minecraft_user:user,expires_at:exp,activated:true,activated_at:new Date().toISOString(),link_used:true})
  });
  if(ins.ok){show(key,new Date(exp),user,el);}
  else{
    const errText = await ins.text();
    el.innerHTML=`<p class="err">Error (${ins.status}): ${errText}</p>`;
  }
}

function show(key,exp,user,el){
  const h=Math.round((exp-new Date())/3600000);
  el.innerHTML=`
    <div class="card-title ok">Your key is ready</div>
    <div class="card-desc">Welcome, <b>${user}</b>. Copy the key below into your key file.</div>
    <div class="key-display" id="kd">${key}</div>
    <button class="btn" onclick="copy()">Copy key</button>
    <p class="warn">⏱ Expires in ~${h}h — come back tomorrow and do the steps again.</p>
    <div class="how">
      <b>How to activate:</b><br>
      1. Copy your key above<br>
      2. Launch Minecraft<br>
      3. Paste the key in the activation box<br>
      4. Click Activate — done!
    </div>
  `;
}

function copy(){
  navigator.clipboard.writeText(document.getElementById('kd').innerText).then(()=>{
    const b=document.querySelector('.btn');
    b.textContent='Copied!';setTimeout(()=>b.textContent='Copy key',2000);
  });
}
run();
</script>
</body>
</html>
