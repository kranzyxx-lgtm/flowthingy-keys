<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>FlowThingy External — Your Key</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#0a0a0f;color:#ddd;font-family:'Segoe UI',sans-serif;
       min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
  .card{background:#111;border:1px solid #1e1e2e;border-radius:12px;padding:40px;
        max-width:520px;width:90%;text-align:center;}
  .logo{font-size:2em;font-weight:900;color:#cc1111;letter-spacing:2px;margin-bottom:6px;}
  .logo span{color:#fff;}
  .sub{color:#666;font-size:0.9em;margin-bottom:24px;}
  .steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px;}
  .step{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;
        justify-content:center;font-weight:700;font-size:0.9em;
        background:#1a4a1a;color:#44ff88;border:1px solid #44ff88;}
  .key-box{background:#0a1a0a;border:2px solid #44ff88;border-radius:8px;
           padding:18px;font-size:1.3em;letter-spacing:3px;color:#44ff88;
           font-weight:700;margin:20px 0;word-break:break-all;}
  .btn{display:block;background:#cc1111;color:#fff;padding:12px 24px;
       border-radius:8px;font-weight:700;font-size:1em;border:none;
       cursor:pointer;width:100%;margin-bottom:10px;transition:background 0.2s;}
  .btn:hover{background:#ff2222;}
  .btn.green{background:#1a6a1a;}
  .btn.green:hover{background:#22aa22;}
  .instructions{text-align:left;background:#0d0d1a;padding:16px;border-radius:8px;
                font-size:0.88em;line-height:1.8;margin-top:16px;}
  .instructions code{color:#44aaff;background:#111;padding:2px 6px;border-radius:3px;}
  .expiry{color:#ffaa00;font-size:0.85em;margin-top:12px;}
  .loading{color:#888;font-size:1em;}
  .error{color:#ff4444;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">Flow<span>Thingy</span></div>
  <div class="sub">External Client — Key System</div>

  <div class="steps">
    <div class="step">✓</div>
    <div class="step">✓</div>
    <div class="step">✓</div>
    <div class="step">✓</div>
  </div>

  <div id="content"><p class="loading">⏳ Generating your key...</p></div>
</div>

<script>
const SUPABASE_URL = "https://azezkzvjpgcvrubbwuep.supabase.co";
const SUPABASE_KEY = "sb_publishable_dhA6MjRAMxL6pp8GSqn6Jw_N-kCi8bS";

function genKey() {
  const s = () => Math.random().toString(36).substr(2,4).toUpperCase();
  return `FT-${s()}-${s()}-${s()}-${s()}`;
}

async function run() {
  const params = new URLSearchParams(window.location.search);
  const user   = params.get('r') || sessionStorage.getItem('ft_user') || '';
  const el     = document.getElementById('content');

  if (!user) {
    el.innerHTML = '<p class="error">❌ No username found. <a href="step1.html" style="color:#cc1111">Start over</a></p>';
    return;
  }

  // Check if user already has a valid (non-expired) key
  const checkRes = await fetch(
    `${SUPABASE_URL}/rest/v1/licenses?minecraft_user=eq.${encodeURIComponent(user)}&activated=eq.true&select=key,expires_at`,
    { headers: { apikey: SUPABASE_KEY, Authorization: `Bearer ${SUPABASE_KEY}` } }
  );
  const existing = await checkRes.json();
  const now = new Date();

  // Find a still-valid key
  const valid = existing.find(r => new Date(r.expires_at) > now);
  if (valid) {
    showKey(valid.key, new Date(valid.expires_at), user);
    return;
  }

  // Generate a new key
  const key       = genKey();
  const expiresAt = new Date(now.getTime() + 24 * 3600 * 1000).toISOString();

  const ins = await fetch(`${SUPABASE_URL}/rest/v1/licenses`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      apikey: SUPABASE_KEY,
      Authorization: `Bearer ${SUPABASE_KEY}`,
      Prefer: 'return=minimal'
    },
    body: JSON.stringify({
      key, minecraft_user: user,
      expires_at: expiresAt,
      activated: true,
      activated_at: now.toISOString(),
      link_used: true
    })
  });

  if (ins.ok) {
    showKey(key, new Date(expiresAt), user);
  } else {
    el.innerHTML = '<p class="error">❌ Error generating key. Try again.</p>';
  }
}

function showKey(key, expiry, user) {
  const el = document.getElementById('content');
  const timeStr = expiry.toLocaleString();
  el.innerHTML = `
    <p style="color:#44ff88;font-size:1.1em;margin-bottom:8px">🎉 Your key is ready!</p>
    <p style="color:#888;font-size:0.85em">Welcome, <b style="color:#fff">${user}</b></p>
    <div class="key-box" id="keyText">${key}</div>
    <button class="btn green" onclick="copyKey()">📋 Copy Key</button>
    <p class="expiry">⏰ Expires: ${timeStr} — Come back daily for a new key!</p>
    <div class="instructions">
      <b>How to use your key:</b><br>
      1. Open <code>File Explorer</code><br>
      2. Type <code>%APPDATA%\\.minecraft</code> in the address bar<br>
      3. Create a new file called <code>flowthingy.key</code><br>
      4. Open it with Notepad and paste your key<br>
      5. Save the file and launch Minecraft!<br><br>
      <b>Need a new key tomorrow?</b><br>
      Just come back to <code>step1.html</code> and complete the steps again.
    </div>
  `;
}

function copyKey() {
  const key = document.getElementById('keyText').innerText;
  navigator.clipboard.writeText(key).then(() => alert('Key copied!'));
}

run();
</script>
</body>
</html>
